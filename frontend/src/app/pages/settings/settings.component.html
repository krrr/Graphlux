<div class="settings-container">
    <h2>Settings <small style="font-weight: normal; font-size: 0.6em; color: #888;">v{{apiService.appInfo()?.version}}</small></h2>
    <form nz-form nzLayout="vertical">
        <nz-form-item>
            <nz-form-label>FFmpeg Executable Path</nz-form-label>
            <nz-form-control>
                <input nz-input [ngModel]="settings().ffmpeg_path" (ngModelChange)="updateField('ffmpeg_path', $event)"
                    name="ffmpeg" placeholder="ffmpeg" />
            </nz-form-control>
        </nz-form-item>

        <nz-form-item>
            <nz-form-label>ImageMagick (magick) Path</nz-form-label>
            <nz-form-control>
                <input nz-input [ngModel]="settings().imagemagick_path"
                    (ngModelChange)="updateField('imagemagick_path', $event)" name="magick" placeholder="magick" />
            </nz-form-control>
        </nz-form-item>

        <nz-form-item>
            <nz-form-label>Max Concurrent Tasks</nz-form-label>
            <nz-form-control>
                <nz-input-number [ngModel]="settings().max_concurrent_tasks"
                    (ngModelChange)="updateField('max_concurrent_tasks', $event)" name="max_concurrent_tasks"
                    [nzMin]="1" [nzStep]="1" style="width: 100%"></nz-input-number>
            </nz-form-control>
        </nz-form-item>

        @if (apiService.appInfo()?.is_packaged) {
            <nz-form-item>
                <nz-form-label>Start on Boot (Windows)</nz-form-label>
                <nz-form-control>
                    <input type="checkbox" [ngModel]="settings().auto_start" (ngModelChange)="updateField('auto_start', $event)" name="auto_start" />
                    <span style="margin-left: 8px;">Enable</span>
                </nz-form-control>
            </nz-form-item>
        }

        <button nz-button nzType="primary" (click)="saveSettings()"><nz-icon nzType="save"
                nzTheme="outline" />Save</button>
    </form>
</div>
