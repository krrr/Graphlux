<div class="container">
    <div class="log-viewer">
        @for (log of filteredLogs(); track $index) {
        <div class="log-entry" [class]="log.level.toLowerCase()">
            <span class="time">[{{ log.time | date:'HH:mm:ss' }}]</span>
            <span class="level">{{ levelShortNames[log.level] || log.level }}</span>
            <span class="message">{{ log.message }}</span>
        </div>
        } @empty {
        <div class="empty-logs">∅</div>
        }
    </div>
</div>
